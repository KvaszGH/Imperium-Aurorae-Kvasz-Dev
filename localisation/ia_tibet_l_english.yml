 the_four_noble_truths_magga: "Magga"
 the_four_noble_truths_magga_desc: "The Truth of the Path to the Cessation of Suffering. It is summerized by the three higher trainings: Morality, Concentration and Wisdom. Through these basic principles, many find peace in their lives, but if the [Root.Monarch.GetTitle] believes our current capital of [Root.Capital.GetName] was a poor choice for leading the faithful, we could relocate at the cost of damaging the delicate trust we share with other Vajrayana schools.\n "
 authority_of_religious_head: "§YAuthority of the Gelug School§!"
 the_four_noble_truths_button_didnt_use_during_life_of_ruler_tt: "Hasn't used this Ability during the Life of the Current\n     §Y[Root.Monarch.GetTitle]§!"
 use_tibet_ability_again: "Allows us to use the @TIB §YTibetan Itinerant Capital§! Ability again without having to wait for the passing and reincarnation of the current §Y[Root.Monarch.GetTitle]§!!"
 tibet_rank_2: "Heaven's Dwelling"
 tibet_ruler_2: "Dalai Lama"

