 swe_declare_independence_ia_title: "Rise of Sweden"
 swe_declare_independence_ia_desc: "Now that we have external allies and internal cooperation, it is time for the Lion of the North to truly roar!"
 swe_swedish_allies_ia_title: "Swedish Allies"
 swe_swedish_allies_ia_desc: "With the Church split between rival Polish and Saxon antipopes, we need to find our own allies in this chaotic world."
 
 # events
 ia_flavor_eng.1.t: "Cynfyn's Reign"
 ia_flavor_eng.1.d: "Cynfyn VI Pendraig, blessed be his name, is a kind and soft-hearted man. As the eldest son of the previous King of Cernyw, he was raised from birth to be the heir, but always preferred the company of his books more than the burdens of rulership. After his acession to the throne, he handed most of the responsibility off to his queen, the French Princess Sibyl Capet, who eagerly rose to the task. Unfortunately, this eagerness stemmed from a deep-seated ambition and a dose of resentment towards her neglectful husband, and she quickly started to bring the nobles under her influence, sometimes resorting to bribery from the royal treasury. Cynfyn's younger brother, Gerens, who inherited the Duchy of Cernyw, is the leader of the main political faction opposing the Queen's takeover of the kingdom. Now, the situation in Cymru is tense and violence might erupt at any moment..."
 ia_flavor_eng.1.a: "Everything is fine!"
 ia_flavor_eng.2.t: "Cynfyn's Reign"
 ia_flavor_eng.2.d: "Cynfyn VI Pendraig, blessed be his name, is a kind and soft-hearted man. As the eldest son of the previous King of Cernyw, he was raised from birth to be the heir, but always preferred the company of his books more than the burdens of rulership. After his acession to the throne, he handed most of the responsibility off to his queen, the French Princess Sibyl Capet, who eagerly rose to the task. Unfortunately, this eagerness stemmed from a deep-seated ambition and a dose of resentment towards her neglectful husband, and she quickly started to bring the nobles under her influence, sometimes resorting to bribery from the royal treasury. Cynfyn's younger brother, Gerens, who inherited the Duchy of Cernyw, is the leader of the main political faction opposing the Queen's takeover of the kingdom. Now, the situation in Cymru is tense and violence might erupt at any moment..."
 ia_flavor_eng.2.a: "The corrupt Queen shall not prevail!"
 ia_flavor_eng.3.t: "Hunting Accident!"
 ia_flavor_eng.3.d: "Tragedy has struck! During the hunting festival, King Cynfyn suffered a fatal accident and has passed away. Queen Sibyl has in her grief refused to let anyone near her husband's body as she weeps over it day and night. In order to maintain the stability of the kingdom, a regency council has been convened, and Duke Gerens has been summoned in order to lead it together with the Queen Dowager as the young King Edern is not of age yet."
 ia_flavor_eng.3.a: "How could this have happened!"
 ia_flavor_eng.4.t: "Bandits!"
 ia_flavor_eng.4.d: "On his way to the capital, Duke Gerens was beset by bandits! Many bodies of both his guards and the bandits were found around the broken down carriage that he was travelling in, but due to the lack of the Duke's body, search parties from both the Duchy of Cernyw and the capital are combing the area to find him, be he dead or alive. At the news of this incident, the Queen Dowager fainted and has been inconsolable since."
 ia_flavor_eng.4.a: "Is the House Pendraig truly cursed?"
 ia_flavor_eng.5.t: "Bandits!"
 ia_flavor_eng.5.d: "On his way to the capital, Duke Gerens was beset by bandits! Many bodies of both his guards and the bandits were found around the broken down carriage that he was travelling in, but due to the lack of the Duke's body, search parties from both the Duchy of Cernyw and the capital are combing the area to find him, be he dead or alive. At the news of this incident, the Queen Dowager fainted and has been inconsolable since. \n Oddly enough, the supposed bandits who beset the Duke were using remarkably high quality weapons and armor. Additionally, the search parties from the capital have been very uncooperative with the Duchy's search efforts."
 ia_flavor_eng.5.a: "Is the House Pendraig truly cursed?"
 ia_flavor_eng.6.t: "Return of the Duke"
 ia_flavor_eng.6.d: "Duke Gerens has returned! And what's more, he has returned with a new Duchess? After the ambush on the road, she found him horrifically injured and brought him home to a remote location in the forests to recuperate as well as hide from the numerous search parties that were in fact trying to kill the Duke! Duke Gerens has announced that the Queen Dowager was in fact the mastermind behind the so-called bandit attack, and has proclaimed a rebellion pushing his own claim as the brother of King Cynfyn and the rightful heir!"
 ia_flavor_eng.6.a: "To arms!"
 ia_flavor_eng.7.t: "Duke Gerens rebels!"
 ia_flavor_eng.7.d: "Duke Gerens has returned to Cernyw! For some incomprehensible reason, however, he claims that his ambushers were actually in the employ of Queen Sibyl, and thus he is using this ridiculous pretext to claim the throne and declare a rebellion. In the interests of maintaining stability, the regency council has decided to directly crown Queen-Regent Sibyl as Queen Regnant of Cymru."
 ia_flavor_eng.7.a: "That new wife of Gerens must have brainwashed him!"
 ia_flavor_eng.8.t: "Leadership of Lady Iorwen"
 ia_flavor_eng.8.d: "The sudden appearance of a complete nobody as the new Duchess of Cernyw was originally met with much opposition in the Duchy. However, any questions as to her position as Duchess have been put to rest as she has taken command of the army personally and proven her talent as a military commander in victory after victory against the Queen's forces. Additionally, rumours from the ducal attendants suggest the Duke and Duchess are quite passionate about each other..."
 ia_flavor_eng.8.a: "Lady Iorwen will lead us to victory!"
 ia_flavor_eng.9.t: "Queen Sibyl Victorious!"
 ia_flavor_eng.9.d: "After a long civil war, the Queen's loyalists have emerged victory! Duke Gerens and Lady Iorwen have vanished after losing the decisive battle, presumed dead. Unfortunately, Prince Edern developed a fever and fell into a coma during the stress of the conflict. Is this the end for House Pendraig?"
 ia_flavor_eng.9.a: "We cannot have a comatose heir..."
 ia_flavor_eng.9.b: "By a miracle, the last heir of Pendragon has awoken from his coma!"
 ia_flavor_eng.10.t: "Duke Gerens Victorious"
 ia_flavor_eng.10.d: "After a long civil war, Duke Gerens and Lady Iorwen have emerged victorious over the forces of the traitorous Queen! Unfortunately, Prince Edern was found dead in the capital, and Queen Sibyl vanished before the city could be taken."
 ia_flavor_eng.10.a: "Long Live King Gerens! Long Live Queen Iorwen!"
 ia_flavor_eng.11.t: "Aid Request from Cymru"
 ia_flavor_eng.11.d: "Princess Sibyl, who married the King of Cymru some years ago, has now become the Queen of Cymru! However, the brother of the previous king, Gerens Pendraig, is apparently engaging in a rebellion to contest her rule! Sibyl is calling for our aid; how shall we answer?"
 ia_flavor_eng.11.a: "Of course we shall aid her!"
 ia_flavor_eng.11.b: "This is their own business to solve."
 ia_flavor_eng.12.t: "Birth of a New Heir!"
 ia_flavor_eng.12.d: "It is a joyous occasion today! Queen Iorwen has given birth to a healthy baby boy and the succession is now secure. What's more, all signs point to the child having a bright future!"
 ia_flavor_eng.12.a: "His name shall be Llewellyn!"
 ia_flavor_eng.14.t: "Entering the Trials"
 ia_flavor_eng.14.d: "There are many paths to being a worthy wielder of §J<<Caledfwlch>>§!. Today, standing in front of the Lake, we have a choice to make, one that will shape the future of our reign over Dumnonia. Which path shall we choose to prove our worthiness?"
 ia_flavor_eng.14.a: "Path of the Wise"
 ia_flavor_eng.14.b: "Path of the Brave"
 ia_flavor_eng.14.c: "Path of the Exemplar"
 ia_flavor_eng.14.e: "On second thought, not now..."
 ia_flavor_eng.15.t: "Trial of Wisdom"
 ia_flavor_eng.15.d: "The Lake presents many questions and scenarios related to the wise governance of Dumnonia. Secluded in a quiet cave by the Lake, several days are spent in contemplation of our responses to the Lake."
 ia_flavor_eng.15.a: "I can't take this anymore!"
 ia_flavor_eng.15.b: "Await the judgement of the Lake"
 ia_flavor_eng.16.t: "Trial of Courage"
 ia_flavor_eng.16.d: "The Lake presents many questions and scenarios related to the courageous leadership of Dumnonia. Secluded in a quiet cave by the Lake, several days are spent in contemplation of our responses to the Lake."
 ia_flavor_eng.17.t: "Trial of the Exemplar"
 ia_flavor_eng.17.d: "The Lake presents many questions and scenarios related to the exemplary guidance of Dumnonia. Secluded in a quiet cave by the Lake, several days are spent in contemplation of our responses to the Lake."
 ia_flavor_eng.21.t: "Outcome of the Trial"
 ia_flavor_eng.21.d: "We have emerged from the cave by the Lake, all of its questions answered. But were our answers to its satisfaction?"
 ia_flavor_eng.21.a: "We are worthy!"
 ia_flavor_eng.21.b: "We are not worthy!"
 ia_flavor_eng.22.t: "Unworthy Ruler of Dumnonia"
 ia_flavor_eng.22.d: "When we return to court, the eyes of all our courtiers and vassals are filled with disdain. Failing the Trial of the Lake is a mark of shame that can never be washed off and would taint our rule forevermore. The honorable choice would be to abdicate..."
 ia_flavor_eng.22.a: "Abdicate in favor of a promising Pendraig cousin"
 ia_flavor_eng.22.b: "Abdicate in favor of our heir"
 ia_flavor_eng.22.c: "Refuse to abdicate!"
 ia_flavor_eng.22.e: "Abdicate and call for new elections!"
 ia_flavor_eng.23.t: "Dealing with the Anglo-Saxons"
 ia_flavor_eng.23.d: "Ever since the invasion of the Angles and Saxons centuries ago, the Germanics and the Britons have been locked into an eternal conflict. Now that we have claimed the ultimate victory, we must decide what we shall do with the descendants of those invaders."
 ia_flavor_eng.23.a: "They are also inhabitants of the Isles by this point."
 ia_flavor_eng.23.b: "No mercy! Drive them back into the sea from whence they came!"
 ia_flavor_eng.24.t: "Outcome of the Wyvern Investigation"
 ia_flavor_eng.24.d: "After long periods of tracking wyvern sightings and offerings of food, we have finally established a few facts. \n 1) They possess a rudimentary intelligence around that of a ten year old child. \n 2) It is possible to communicate with them using body language, hand gestures, and drawn symbols. \n With these facts established, our researchers have managed to secure agreements with most of the known wyverns to avoid their nesting areas and provide hunting grounds in exchange for them leaving our livestock and people alone. Additionally, some of the elder wyverns seem to have suggested that they have some draconic ancestor whose whereabouts and characteristics we have however not been able to ascertain."
 ia_flavor_eng.24.a: "Fascinating."
 ia_flavor_eng.25.t: "Our Pen-Dragon Ancestor"
 ia_flavor_eng.25.d: "Albion peers at [Root.Monarch.GetName] closely, inspecting [Root.Monarch.GetHerHim] from head to toe. After a long pause, it speaks.\n Indeed, it appears that you have a few drops of my blood coursing through your veins. Ach, your appearance has reminded me of some memories from my distant youth, when I still had inclinations towards glory and violence.\n Albion starts staring off into the distance and muttering to itself, before finally gesturing for [Root.Monarch.GetName] to leave. \n Oh, and your distant cousins the wyverns should also recognize you..."
 ia_flavor_eng.25.a: "Well, that was something."
 permanent_albion_general_tt: "§YAlbion§! will be permanently available as a §YGeneral§!!"
 ia_flavor_eng.26.t: "Lady Iorwen's Influence"
 ia_flavor_eng.26.d: "Contrary to the [Root.Religion.GetName] state religion of our country, Iorwen adheres to the old Druidic ways, and has proven to be quite persistent in teaching these ways to her child (and our heir), [Root.Heir.GetName]. It appears [Root.Heir.GetSheHe] is taking quite eagerly to the Druidic religion as well, and even some of the commoners are converting."
 ia_flavor_eng.26.a: "Only time will tell what this might bring..."
 ia_flavor_eng.27.t: "Druidic Faith of [Root.Monarch.GetName]"
 ia_flavor_eng.27.d: "Contrary to the [Root.Religion.GetName] state religion of our country, [Root.Monarch.GetName] adheres to the old Druidic ways. This has lead to some tensions at court ever since their ascension to the throne, and we must decide how to resolve these tensions."
 ia_flavor_eng.27.a: "Dumnonia shall be Druidic!"
 ia_flavor_eng.27.b: "Dumnonia shall be a land of tolerance!"
 ia_flavor_eng.27.c: "[Root.Monarch.GetName] must renounce their Druidic faith!"
 ia_flavor_eng.28.t: "Of Faith and Diplomacy"
 ia_flavor_eng.28.d: "Though we would prefer to treat all equally with honor and dignity, the nature of the religious conflicts developing in Europe mean that everyone is demanding us to present a stance. How shall we choose?"
 ia_flavor_eng.28.a: "Align ourselves with religious brothers"
 ia_flavor_eng.28.b: "Clarify that we do not get involved in religious conflicts"
 ia_flavor_eng.28.c: "Spread our own message of harmony"
 change_religion_to_irenicist_tt: "All of our state religion provinces that are our culture group or accepted culture will convert to §YIrenicist§!."
 ia_flavor_eng.29.t: "Aftermath of the Last Crusade"
 ia_flavor_eng.29.d1: "Our soldiers returning from the Crusade bring with them horrible stories of burnt cities, salted fields, and rivers of blood. Many did not return at all, and those who did suffer nightmares preventing them from sleeping at night and causing madness in the day. Our knights question the honor of the deeds they participated in, and many have foresworn the sword.\n\nWhat horror have we perpetuated? What sort of God could possibly demand such bloodshed in his name? No, no, no...."
 ia_flavor_eng.29.d2: "Refugees come to our shores with horrible stories of burnt cities, salted fields, and rivers of blood. Our agents report that the Crusade has resulted in bloodshed on a scale never before seen and the deliberate destruction of formerly fertile lands. Our clergy are calling councils, our nobles are gathering in Parliament, and our commoners are rallying in fields, all demanding answers to one question: what sort of God could possibly demand such bloodshed in his name?"
 ia_flavor_eng.29.a: "We must embrace a more pacifist path!"
 ia_flavor_eng.29.b: "We were right all along not to worship such a God."
 ia_flavor_eng.29.c: "What have we done?!"
 ia_flavor_eng.29.e: "We must aid the suffering."
 ia_flavor_kor.1.t: "Sickness of Sejong"
 ia_flavor_kor.1.d: "Throughout most of his life, Sejong had chronic worsening health issues. Ranging from knee and back pain to excess thirst and urination, these issues had by 1437 already worsened to the point that Sejong proposed to his ministers to delegate government affairs to the Crown Prince. After repeated refusals by the ministers, in 1443 Sejong issued an edict against the protest of the government that the Crown Prince would handle state affairs for the latter half of each month, and in 1445 delegated government functions fully to the Crown Prince. Thereafter Sejong devoted himself to working on the Hangul language, reporting to ministers in 1446 that he was 'suffering from various illnesses and just waiting in the palace for death'. Though he would not formally abdicate before his death in 1450, the Crown Prince Yi Hyang (King Munjong) had fully taken over rule of Joseon well before that point."
 ia_flavor_kor.1.a: "Let Sejong rest..."
 ia_flavor_kor.2.t: "Suyang's Coup"
 ia_flavor_kor.2.d: "King Munjong's health proved to be even weaker than his father's, dying in 1452 at the age of merely 37, leaving behind an underage heir controlled by the Left State Councillor Kim Chongso. Munjong's younger brother Yi Yu, also known as the Grand Prince Suyang, a talented administrator and military organizer, resisted the usurpation of the royal family's authority by the State Council and eventually would launch a coup killing Kim Chongso and his supporters in 1453. After the coup, Suyang would arrest and execute his surviving brothers and by 1455 forced the powerless young king to abdicate and later commit suicide by poison. Despite the ruthless nature in which Suyang had come to the throne, King Sejo (his temple name) would prove to be one of Korea's most talented administrators as well as reorganizing the military for conflicts against the rising Jurchens."
 ia_flavor_kor.2.a: "How much unrest can Joseon take?"
 ia_flavor_kor.3.t: "Claiming the Celestial Throne"
 ia_flavor_kor.3.d: "The Celestial Empire in China has long prided itself as the pinnacle of civilization and demanded prostration from others in exchange for trade access. While some of the past Shoguns of Japan have paid this lip service for wealth, now that Japan is united and centralized, why should we accept this humiliation any longer? Besides, having an external enemy to unify against will help solidify our control over Japan. It is time for the Celestial Throne to change hands, and Korea is the best landing point for this project."
 ia_flavor_kor.3.a: "Prepare the forces, send a missive to Korea!"
 ia_flavor_kor.3.b: "This is not worth it."
 ia_flavor_kor.4.t: "Recently, we have received a secret missive from Japan suggesting that we should aid them in an invasion of China, with an implicit threat of us being on the chopping block should we refuse. But are we truly afraid of these petty pirates? What's the worst they could do, send some more pirates to harass our coasts? Surely they would never actually attempt to invade China."
 ia_flavor_kor.4.a: "Ignore these petty pirates."
 ia_flavor_kor.4.b: "Actually, they have a point..."
 ia_flavor_kor.5.t: "Invasion of the Mainland"
 ia_flavor_kor.5.d: "It is time to invade!"
 ia_flavor_kor.5.t: "To Korea!"
 ia_flavor_kor.5.d: "To China!"
 cossack_horses.3.title: "Cossacks request new grazing grounds"
 cossack_horses.3.desc: "Our province which has thus far produced livestock has been identified by our Cossacks as prime grazing group for horses. They request that we change the sort of livestock inhabiting this province."
 cossack_horses.3.a: "Sure why not"
 cossack_horses.3.b: "No, and don't ask again"