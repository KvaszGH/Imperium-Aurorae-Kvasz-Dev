 dumnonia_chivalric_realm_desc: "This realm is founded upon the values of Chivalry, its tenets carved into the very bones of our people."
 dumnonia_peasants_reform: "The Peasants' Duty"
 dumnonia_peasants_reform_desc: "The foundation of our nation rests upon the peasants who till the fields and fill the levies. It is our responsibility to protect them and ensure they can flourish."
 dumnonia_republic_reform: "Round Table Council"
 dumnonia_republic_reform_desc: "The Round Table Council upholds the highest standards of chivalry anywhere in Europe. Led by a worthy elected wielder of Excalibur, every member of the Round Table pledges to always adhere to the tenets of Courage, Justice, Mercy, Charity, Honour, Humility, and Selflessness."
