 #Missions
 eng_clarion_call_tt: "While at war with any §RAbolitionist§! nation, we and §Gall our allies§! in the war will gain the §JClarion Call§! modifier, granting the following:\n§G+20% movement speed§!\n§G+25% reinforce speed§!\n§G+25% manpower recovery§!\n\n(Note: this feature will stop working if we change tag!)"
 eng_abolitionism_title: "Facing the Abolitionists"
 eng_abolitionism_desc: "While the Abolitionists present many thought-provoking questions about the nature of divinity and faith, their conclusions are simply wrong and their proposed solutions too destructive. We must show the world that there exists a nobler path than tearing everything down in rage!"
 eng_the_last_crusade_title: "Aftermath of the Crusade"
 eng_the_last_crusade_desc: "So many have died in the name of reclaiming the holy lands, in the name of their faith. But in the end, what have they gained? What benefit to the people has the sacrifice of this many lives wrought? Is there even any value to this strife?"
 eng_age_of_reformation_title: "Age of Reformation"
 eng_age_of_reformation_desc: "A new era has dawned, one of religious strife and great upheavals in established faiths. How shall we navigate this era?"
 eng_liberation_wars_protectorate_acceptance_tt: "Nations released by us in §YLiberation Wars§! will §Gautomatically become our§! §YProtectorate§!!"
 eng_liberation_wars_bonus_tt: "Declaring §YLiberation Wars§! against §YRivals§! and §YGreat Powers§! will now grant §G10% Morale§! and §G25% Manpower Recovery§! for §Y5 years§!!\nAdditionally, we will be able to fabirate §YLiberation§! against anyone.\n(The §YLiberation§! casus belli can be fabricated with a §Ydiplomatic interaction§! requiring 25 spy network.)"
 eng_chivalric_protectorates_tt: "Our §YProtectorates§! will receive the following §GChivalric Boon§!: \n§G-2 National Unrest§! \n§G-10% Leader Cost§! \n§G+0.5 Army Tradition§! \n§R-25% Tax Modifier§! \n§R-5% Administrative Efficiency§! \n§G-20% Liberty Desire§!"
 eng_spread_chivalry_title: "Spread Chivalry"
 eng_spread_chivalry_desc: "It would be selfish of us to keep the values of chivalry to ourselves. We must spread this joy to others!"
 eng_age_of_chivalry_title: "§JAge of Chivalry§!"
 eng_age_of_chivalry_desc: "With all the chivalric virtues fulfilled, it is time for the dawn of a new era!"
 eng_weapons_foundries_title: "Weapons Foundries"
 eng_weapons_foundries_desc: "Only the finest weapons shall grace the hands of our noble knights. They deserve the best equipment with which to smite our ignoble enemies."
 eng_fires_of_industry_title: "Fires of Industry"
 eng_fires_of_industry_desc: "The flames in our factories burn as bright as the embers of our hearts. One production line at a time, we forge the future of Dumnonia!"
 eng_knight_resplendent_title: "Resplendent Chivalry"
 eng_knight_resplendent_desc: "Our adherence to the Code of Chivalry has created a Resplendent Realm."
 eng_honest_business_title: "Honest Business"
 eng_honest_business_desc: "Honest Business makes a Prosperous Realm"
 eng_fine_tin_title: "Fine Tin"
 eng_fine_tin_desc: "Fine Tin makes Great Cannons"
 eng_good_steel_title: "Good Steel"
 eng_good_steel_desc: "Good Steel makes a Stout Heart."
 eng_chivalry_upheld_title: "Chivalry Upheld"
 eng_chivalry_upheld_desc: "We have begun the first steps of establishing our chivalric bona fides."
 dum_upgraded_clerical_education_tt: "Upgrades the §YClerical Education§! privilege to give §G+10% loyalty§! and §G-10% idea cost§!!"
 eng_clergy_role_title: "Role of the Clergy"
 eng_clergy_role_desc: "The nobles protect the land and the peasants till the land. So what is the role of the clergy? It is to maintain the records and teach reading and counting, of course."
 eng_noblesse_oblige_title: "Noblesse Oblige"
 eng_noblesse_oblige_desc: "The nobility do not enjoy their wealth and privileges for nothing. With great power comes great responsibility, and the nobles of Dumnonia understand this better than elsewhere."
 unlocks_nobles_priv_to_counter_peasants_penalties_tt: "Unlocks a special §Ynobles privilege§! that cancels out various penalties from §Ypeasants privileges§!!"
 noblesse_oblige_enabled_flag: "Noblesse Oblige Enabled"
 eng_peasants_duty_title: "Peasants' Duty"
 eng_peasants_duty_desc: "The peasants bear a great weight of duty in cultivating the land and providing the resources for a nation to exist. We must provide for them in turn and ensure their duty does not become backbreaking."
 eng_knights_vow_title: "A Knight's Vow"
 eng_knights_vow_desc: "The first step to chivalry lies in a Vow."
 dum_1_virtues_tt: "Has §Ycompleted 1 Virtue§!. Current value: [Root.DumVirtues.GetValue] / 1"
 dum_3_virtues_tt: "Has §Ycompleted 3 Virtues§!. Current value: [Root.DumVirtues.GetValue] / 3"
 dum_5_virtues_tt: "Has §Ycompleted 5 Virtues§!. Current value: [Root.DumVirtues.GetValue] / 5"
 dum_7_virtues_tt: "Has §Ycompleted 7 Virtues§!. Current value: [Root.DumVirtues.GetValue] / 7"
 merc_wyvern_dragoons: "§JWinged Dragoons§!"
 unlock_wyvern_dragoons_tt: "Unlocks the §JWinged Dragoons§! §Yunique mercenary company§!!"
 eng_wyvern_riders_title: "Wyvern Riders"
 eng_wyvern_riders_desc: "Armed with new knowledge from Albion, we can attempt to form pacts with the Wyverns and establish a new order of Winged Dragoons."
 albion_in_court_flag: "Albion at Court"
 eng_dragon_among_us_title: "The Dragon Among Us"
 eng_dragon_among_us_desc: "Our investigation of the wyverns has indicated that they have an ancestor who is a true dragon. Further, the legends regarding the origins of our ruling dynasty, the foundation of our kingdom, and our very coat of arms suggest that a dragon played a great role in Dumnonia's history. We should seek out this dragon, if they still live!"
 completed_wyvern_investigation: "Completed Wyvern Investigation"
 eng_investigate_wyverns_title: "Investigate the Wyverns"
 eng_investigate_wyverns_desc: "Wyvern sightings have always been frequent in the hills of Cymru. Recently, our natural philosophers have suggested that we should launch an investigation into their habits and see if their raids on our livestock and villages can be avoided or prevented."
 eng_prydain_united_title: "Prydein Unified"
 eng_prydain_united_desc: "All of Prydein is now unified. It is time for a new era of unity!"
 eng_expel_anglo_saxons_title: "Fate of the Invaders"
 eng_expel_anglo_saxons_desc: "With the prophecy fulfilled, we must decide the fate of the defeated invaders."
 eng_draw_the_sword_title: "Draw the Sword"
 eng_draw_the_sword_desc: "As the prophecy states, only the leadership of a worthy ruler with §J<<Caledfwlch>>§! in hand will see us victorious over the invaders who have displaced us native Britons for centuries. It is time to draw §J<<Caledfwlch>>§! once again!"
 eng_charity_title: "§GCharity§!"
 eng_charity_desc: "What wealth and possessions you hold greedily might deprive a starving mother of the coins she needs to feed her children. Be Generous, even to yourself. Everyone deserves a chance to have a bed, and a warm meal every night."
 eng_honor_title: "§GHonour§!"
 eng_honor_desc: "Keep true to your oath, and do your best to keep to your word, unless the needs of the many demands otherwise. Whether you value most faith in others, or faith in your god, the order cares not. What matters is being true to what you believe in."
