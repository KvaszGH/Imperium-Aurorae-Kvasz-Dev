 eng_mercy_desc: "Use your words carefully, for a careless word can maim as easily as a sword, and treat all fairly, for there was once a day when you were weak, and the weak now might become strong. Respect in all others the chance for change, even in those you hate. Be merciful to those who are earnestly trying, and have failed. Sometimes a hypocrite is just a person in the process of changing. Only those who will never stop hurting others deserve no mercy."
 eng_justice_title: "§GJustice§!"
 eng_justice_desc: "I do not love the bright sword for its sharpness, nor the arrow for its swiftness, nor the warrior for his glory. I love only that which they defend."
 eng_humility_title: "§GHumility§!"
 eng_humility_desc: "A knight is foremost a servant of the people. This is so that the people may live a safe, prosperous, and happy life. Encourage joy in others, and remember to join them, especially the common folk. A Knight will face challenges and doubts on their journey, so reminders of what you're fighting for are necessary."
 dum_supremacy_1_tt: "Has §Ywon 10 wars§!. Current value: [Root.DumWins.GetValue] / 10"
