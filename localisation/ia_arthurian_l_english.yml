 eng_begin_sword_trial_title: "Attend the Trial of the Lake"
 eng_begin_sword_trial_desc: "Every ruler of Dumnonia must pass the Trial of the Lake to prove themselves worthy of wielding §J<<Caledfwlch>>§! in service of the nation."
