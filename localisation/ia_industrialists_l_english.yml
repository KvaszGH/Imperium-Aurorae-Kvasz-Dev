#Government Reforms
 estate_industrialists_enabled_reform_nonrev: "A New Managerial Class?"
 estate_industrialists_enabled_reform_nonrev_desc: "Last Crusade has shown the world one thing: The Xhizo empire acting as the heart of the world cannot be stopped through complacency and ancient concepts. Ever since the mass establishment of manufactories, a new class made up of owners of said manufactories has been emerging, slowly gathering influence within our lands, bringing new ideas forth on all matters of state and management, which might launch us into an era of newfound prospertity and strenght."
 estate_industrialists_enabled_reform_rev: "Root Out Reactionary Elements"
 estate_industrialists_enabled_reform_rev_desc: "Men have lost their lives at the whim of kings and Gods, but no more. One of the last reactionary parts of our government, which did nothing to stop the opression of the old and infact, benefitted from it, are the merchant classes. We shall replace them with the Technocrats, who understand that man who works for himself and his fellow men shall find fulfillment in his life, and that strenght is not gathered through faith, but through the willpower to press through difficult times."
 mechanic_enables_estate_industrialists_yes: "Enables §YTechnocrats§! estate."
#Estate Actions and their Decisions
 enable_estate_action_DEMAND_WORKERS_INDUSTRIALISTS_tt:0 "[Root.EnableEstateDecisionText] §Y[Root.GetIndustrialistsName]: Demand Worker War Contribution§!"
 disable_estate_action_DEMAND_WORKERS_INDUSTRIALISTS_tt:0 "[Root.DisableEstateDecisionText] §Y[Root.GetIndustrialistsName]: Demand Worker War Contribution§!"
 has_enabled_estate_action_DEMAND_WORKERS_INDUSTRIALISTS_tt:0 "[Root.HasEstateDecisionText] §Y[Root.GetIndustrialistsName]: Demand Worker War Contribution§!"
 estate_industrialists_demand_workers_title: "[Root.GetIndustrialistsName]: Demand Worker War Contribution"
 estate_industrialists_demand_workers_desc: "Dockworkers, miners, farmers, to arms! Times are dire, and thus we need fresh bodies for the war effort."
 enable_estate_action_RECRUIT_NATURAL_SCIENTIST_INDUSTRIALISTS_tt:0 "[Root.EnableEstateDecisionText] §Y[Root.GetIndustrialistsName]: Recruit Natural Scientist§!"
 disable_estate_action_RECRUIT_NATURAL_SCIENTIST_INDUSTRIALISTS_tt:0 "[Root.DisableEstateDecisionText] §Y[Root.GetIndustrialistsName]: Recruit Natural Scientist§!"
 has_enabled_estate_action_RECRUIT_NATURAL_SCIENTIST_INDUSTRIALISTS_tt:0 "[Root.HasEstateDecisionText] §Y[Root.GetIndustrialistsName]: Recruit Natural Scientist§!"
 estate_industrialists_recruit_natural_scientist_decision_title: "[Root.GetIndustrialistsName]: Recruit Natural Scientist"
 estate_industrialists_recruit_natural_scientist_decision_desc: "We can bring a technocratically focused Natural Scientist forth to act as a personal advisor for the [Root.Monarch.GetTitle]."
#Agendas
 estate_industrialists_conquer_good:0 "Conquer Strategic Resources in [agenda_province.GetName]"
 estate_industrialists_conquer_good_desc:0 "To fuel the industry of our [Root.GetIndustrialistsName], we need to conquer the strategic goods in [agenda_province.GetName]."
 estate_industrialists_workshop:0 "Build a Workshop in [agenda_province.GetName]"
 estate_industrialists_workshop_desc:0 "In order to get as many new fresh people with fresh ideas into the ranks of [Root.GetIndustrialistsName], we need to build a workshop in [agenda_province.GetName]."
 estate_industrialists_furnace:0 "Build a Furnace in [agenda_province.GetName]"
 estate_industrialists_furnace_desc:0 "The fact that proper means, through which the Coal in [agenda_province.GetName] could get processed for our benefit, are lacking, is a travesty which must be fixed."
 estate_industrialists_production_dev:0 "Develop Production in [agenda_province.GetName]"
 estate_industrialists_production_dev_desc:0 "[agenda_province.GetName] must be expanded to allow for greater production within our nation."
 estate_industrialists_destroy_church:0 "Demolish the religious building of [agenda_province.GetName]"
 estate_industrialists_destroy_church_desc:0 "The [Root.GetIndustrialistsName] are demanding we free up building space in the province of [agenda_province.GetName] by destroying the local religious building there."
 estate_industrialists_send_merchant:0 "Send Merchant into [agenda_province.GetName]"
 estate_industrialists_send_merchant_desc:0 "With the large sway of trade influence we hold within the markets of [agenda_province.GetName], the [Root.GetIndustrialistsName] are eager to send a trader there to extract value and possibly bring more favorable resources our way."
 estate_industrialists_humiliate_wealthy_neighbor:0 "Humiliate Wealthy Neighbors of [wealthy_neighbor.GetName]"
 estate_industrialists_humiliate_wealthy_neighbor_desc:0 "[Root.GetIndustrialistsName] have seen the neighboring wealth of the [wealthy_neighbor.GetAdjective], and they are eager to knock them down a peg."
 estate_privileges_and_agendas_events.3.indus: "The Proposal of the [Root.GetIndustrialistsName]"

#Events
 monopoly_privileges.13.t:0 "Extension of the Monopoly on Strategic Goods"
 monopoly_privileges.13.d:0 "The monopoly on strategic goods we granted to the [Root.GetIndustrialistsName] has expired, meaning that we are now able to reclaim the income from the trade of strategic goods. However, the [Root.GetIndustrialistsName] are keen to keep their privileges and are offering to pay us a lump sum in return for the monopoly being guaranteed for a further 10 years."
 monopoly_privileges.13.b.tooltip:0 "We will be able to revoke the §YMonopoly on Strategic Goods§! estate privilege."
 monopoly_privileges.14.t:0 "Extension of the Monopoly on Advanced War Goods"
 monopoly_privileges.14.d:0 "The monopoly on advanced war goods we granted to the [Root.GetIndustrialistsName] has expired, meaning that we are now able to reclaim the income from the trade of advanced war goods. However, the [Root.GetIndustrialistsName] are keen to keep their privileges and are offering to pay us a lump sum in return for the monopoly being guaranteed for a further 10 years."
 monopoly_privileges.14.b.tooltip:0 "We will be able to revoke the §YMonopoly on Advanced War Goods§! estate privilege."
 estate_privileges_and_agendas_events.6.indus: "The [Root.GetIndustrialistsName]"
 estate_privileges_and_agendas_events.7.indus: "Seize it from the [Root.GetIndustrialistsName]"
 estate_industrialists_enabled_tt: "§TA government reform in Economical Matters will appear and be enacted.§!"
 estate_industrialists_insufficient_reform_progress_tt: "§RSince we do not have sufficient government progress to enact the reform, we will instead receive:§!"
 ia_estate_industrialists_events.1.t: "Rise of a New Class"
 ia_estate_industrialists_events_1_1: "Scandalous! Scandalous! Scandalous!\n\nThe World hath gone mad! Our oldest, wisest [Root.GetChurchOrFallbackName] prophesized such an occurance, yet now that the newfound obsession, nay, sickness of the Technocrats spread itself across the world like an epidemic, it is our time to respond. Nature and the sacred order of old is now not only being disrespected, but also vandalized and pushed back to make room for newly man-made structures of evil.\n\nBrothers! Sisters! We must hold strong, for the Fae and all they taught us!"
 ia_estate_industrialists_events.1.a: "The Primordial Order will be Protected."
 ia_estate_industrialists_events_1_2: "And thus, the enemies of the most Righteous peoples under heaven pull another card out of their sleeve to try and catch up to our mighty civilization.\n\nThe Technocrats, emerging to take part in the ruling of many countries across the world are, in many ways, inferior to our own [Root.GetAlchemistsName], as is to be expected. Yet, there seems to be an undying fire within how they manage their subordinates and how they act to grab power and every little advantage they can in order to, mayhaps, eradicate us. Complacency is no longer an option, and we must push our [Root.GetAlchemistsName] to make sure our civilization stands for another millennia."
 ia_estate_industrialists_events.1.b: "Have we sunk so low as to copy barbarians?"
 ia_estate_industrialists_events_1_3: "A new phenomenon has been appearing within our many manufactories, as their owners and managers have been getting themselves directly involved in political affairs and how they shall be governed, more fiercy than even the estates within our court.\n\nThey bring forth many new economic theories, ideas for land usage, and how to maximize the efficiency of our natural resources, in the final aim to improve our technological progress. Direct cooperation with them would yield another benefit: Direct access to the workforce and ways to dispose with it.\n\nDo we invite these new, ambitious minds into our court and give them direct representation within our court?"
 ia_estate_industrialists_events.1.c: "The Worker gets the final say."
 ia_estate_industrialists_events.1.d: "A new era has dawned. They are needed."
 ia_estate_industrialists_events.1.e: "Interesting."
 ia_estate_industrialists_events.2.t: "Advancement of the [Root.GetIndustrialistsName]"
 ia_estate_industrialists_events.2.d: "The status of the [Root.GetIndustrialistsName] does not rest on the same old traditions as that of the rest of the court. Instead they have had to make their own fortunes by working diligently and then risking the concequences of poor workplace management to again expand their businesses. As a rule, however, this has gone very well for them lately. While not as prestigious business is in many ways the backbone of our economy and through their control of the workers the [Root.GetIndustrialistsName] have managed to increase their power over our country."
 ia_estate_industrialists_events.2.a: "Ok."
 ia_estate_industrialists_events.3.t: "Decline of the [Root.GetIndustrialistsName]"
 ia_estate_industrialists_events.3.d: "Recent strings of workplace accidents, poor management, and not filling the express purpose through which the [Root.GetIndustrialistsName] got an invitation into our court in the first place, have caused a sharp decline in their influence across our country. Seems like fortune doesn't smile on the [Root.GetIndustrialistsName] for long either."
 ia_estate_industrialists_events.3.a: "Ok."
 ia_estate_industrialists_events.100.t: "Workplace Accident!"
 ia_estate_industrialists_events.100.d: "Be it neglect, lacking access to proper resources or ill-advised decisions, the workplace of [industrialists_workplace_accident_province.GetName] has suffered a collapse and in the process, several workers died or got injured.\n\nThere seems to be no resolution to the conflict, as the local [Root.GetIndustrialistsName] either blame the workforce, blame their lack of avaible resources to improve worker conditions or simply stay silent on the matter. The workers meanwhile demand compensation and refuse to work until conditions improve, citing the neglect of [Root.GetIndustrialistsName] as the core reason as to why the provinces buildings are falling apart, putting everyone within [industrialists_workplace_accident_province.GetName] in danger."
 ia_estate_industrialists_events.100.a: "Appropriate the land away from the [Root.GetIndustrialistsName] and pay for repairs."
 ia_estate_industrialists_events.100.b: "Apologize but leave the issue alone."
 ia_estate_industrialists_events.100.c: "Blame the Local Workforce."
 ia_estate_industrialists_events.101.t: "Workforce Revolt Spreads"
 ia_estate_industrialists_events.101.d: "Terrible news strikes our court, as the workforce revolt in [This.GetName] has spread to neighboring provinces, bringing about the destructive ways of an angry mob as the situation threatens to spiral out of control.\n\nThe [Root.Owner.GetIndustrialistsName] plead with us to put the situation under control, yet most deny accountability when it comes to the issue of what caused the revolt in the first place, instead blaming the violent tendencies of the uneducated."
 ia_estate_industrialists_events.101.a: "Force must be met with force."
 ia_estate_industrialists_events.101.b: "Threaten them militarily into stopping their advance."
 ia_estate_industrialists_events.102.t: "Smog Covers [industrialists_smog_province.GetName]!"
 ia_estate_industrialists_events.102.d: "Coal has been a great blessing for our nation, improving all aspects of society. It's excessive use was inevitable, as there are many obvious benefits to using coal as a source of heat.\n\nYet today, the province of [industrialists_smog_province.GetName] suffered an unaccounted concequence: The build up of smoke descended upon the province, surrounding everyone within [industrialists_smog_province.GetName] and leaving them with respiratory problems, damaged eyesight or worse. The [Root.GetIndustrialistsName] argue it's not a big deal, and that the negative impact on the populace is being overexaggarated, demanding from us to put out an order to force everyone back to work."
 ia_estate_industrialists_events.102.a: "Disallow work in the location till it's safe again."
 ia_estate_industrialists_events.102.b: "We can't let our production down for long."
 ia_estate_industrialists_events.102.c: "Negative impact? Get back to work."
 ia_estate_industrialists_events.103.t: "Brawl Spirals out of Control!"
 ia_estate_industrialists_events.103.d: "Worrying reports have been delivered with great haste to [Root.Capital.GetName] from [industrialists_brawl_province.GetName]. The local leading [Root.GetIndustrialistsName] have seen a spar between two disagreeing workers, a regular occurance, which spiraled into the whole manufactory rioting.\n\nThe [Root.GetIndustrialistsName] do not feel safe staying within the province and are asking us to intervene on their behalf in any way we can, as their fate may be grim if the rage of the mob gets directed at them."
 ia_estate_industrialists_events.103.a: "Let the situation pass."
 ia_estate_industrialists_events.103.b: "Ensure the [Root.GetIndustrialistsName] can defend themselves."
 ia_estate_industrialists_events.103.c: "The army must intervene!"
 ia_estate_industrialists_events_103_tt: "Several years worth of manpower from §Y[industrialists_brawl_province.GetName]§! will be §Rsubtracted from our manpower pool§!!"
 ia_estate_industrialists_events.4.t: "A New Wave of Prosperity"
 ia_estate_industrialists_events.4.d: "$MONARCH$ has become renowned for [Root.Monarch.GetHerHis] acceptance of new ideas and willingness to try out new theories and technologies, and allowing the [Root.GetIndustrialistsName] the freedoms and representation they needed in order to pay out dividends. Scientists, manufactory owners and philosophers are flocking to $CAPITAL$ and the thriving economy has allowed extensive technological funding.\n\nWe shall prosper again, and thus, a new city showing off our wealth and greatness is being constructed."
 ia_estate_industrialists_events.5.t: "Dispute over Enlistment"
 ia_estate_industrialists_events.5.d: "With the ever-increasing demand for fresh bodies in all walks of life, there was bound to be conflict over which person can go where and for what reasons. The city of [disputed_workforce_province.GetName] has recently found itself in this conflict, with the local [Root.GetIndustrialistsName] and army officers getting into heated arguments over allocation of a fresh wave of men. The army officers want to enlish them into the army, while [Root.GetIndustrialistsName] believe they are needed for further expansion of manufactories."
 ia_estate_industrialists_events.5.a: "Side with the Army Officers."
 ia_estate_industrialists_events.5.b: "Side with the [Root.GetIndustrialistsName]"
 ia_estate_industrialists_events.6.t: "Education of the Heir"
 ia_estate_industrialists_events.6.d: "The leading members of the [Root.GetIndustrialistsName] recently came forth with an offer to the [Root.Monarch.GetTitle] about furthering our heirs education. It is no secret that the [Root.GetIndustrialistsName] aren't doing this out of the kindness of their hearts, but as a long term strategy to sway our heir to favor their interests over the interests of other estates. If we reject their offer, they will oppose our heirs claim to the future rulership of the state."
 ia_estate_industrialists_events.6.a: "Teach [Root.Heir.GetHerHim] about realm administration."
 ia_estate_industrialists_events.6.b: "Teach [Root.Heir.GetHerHim] about foreign policy."
 ia_estate_industrialists_events.6.c: "Get away from my [Root.Heir.GetDaughterSon]!"
 ia_estate_industrialists_events.7.t: "Shady Contracts"
 ia_estate_industrialists_events.7.d: "The Merchant guilds in charge of conducting our trade have come to us with a series of complaints regarding the [Root.GetIndustrialistsName]. "They show a lack of respect towards us as equal partners in the creation of wealth and they fail to deliver on their quotas or within the agreed upon timeframes, causing delays and further issues." are their most grievous complaints.\n\nWhile we do not know if these complains are valid, as representatives of the [Root.GetIndustrialistsName] deny any wrongdoing, we know something must be done. Representatives of both estates have been summoned into our court by $MONARCH$, with the final decision on the issue being..."
 ia_estate_industrialists_events.7.a: "Bend the rules in favor of the [Root.GetIndustrialistsName]."
 ia_estate_industrialists_events.7.b: "Force the [Root.GetIndustrialistsName] to uphold basic expectations."
 ia_estate_industrialists_events.8.t: "Accusations of Heresy"
 ia_estate_industrialists_events.8.d: "The [Root.GetIndustrialistsName] have had conflicts of their faithfulness questioned by the church ever since they came about as an estate in our court, as the [Root.GetIndustrialistsName] have very little interest in religion and do not hide that disinterest in the slightest. Confessions have led the church to believe the [Root.GetIndustrialistsName] are filled with sin and thus, viscious arguments have been happening between them ever since.\n\nThis conflict reached it's boiling point at the newly prosperous city of [indus_against_church_province.GetName], where the local clergy and [Root.GetIndustrialistsName] have been unable to make a decision about where the recently acquired massive sum of funds shall be spent. The clergy want a massive religious building to showcase the power of faith which has brought us to where we are today, and the [Root.GetIndustrialistsName] want to further improve their production methods. Regardless of who we choose to favor, this will inevitably alter the perception which our state has towards faith."
 ia_estate_industrialists_events.8.a: "The State is built on Labor"
 ia_estate_industrialists_events.8.b: "The State is built on Piety"