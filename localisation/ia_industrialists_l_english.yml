l_english:
 estate_industrialists: "Industrialists"
 estate_industrialists_desc: "Industrialist estate represent wealthy owners of multiple manufactories, disregarding matters of faith and trade for raw produce and achieving greater technological development for matters of personal wealth, looking to prove themselves as a viable emerging class."
 estate_technocrats: "Technocrats"
