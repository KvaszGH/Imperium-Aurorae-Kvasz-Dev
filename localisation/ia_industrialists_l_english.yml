#Privileges
 estate_industrialists_rheinholzfallergilde:0 "Rheinholzfällergilde"
 estate_industrialists_rheinholzfallergilde_desc:0 "WIP"
 estate_industrialists_maurerzunfts_codified_laws_of_construction:0 "Maurerzunft's Codified Laws of Construction"
 estate_industrialists_maurerzunfts_codified_laws_of_construction_desc:0 "WIP"
 estate_industrialists_land_contracts:0 "$ESTATE_NAME$ Land Contracts"
 estate_industrialists_land_contracts_desc:0 "We must lease land to $ESTATE_NAME$ under strict contracts to establish production centres across our nation, but such contracts require a larger bureaucracy to police and maintain."
 estate_industrialists_land_of_potential:0 "Land of Potential"
 estate_industrialists_land_of_potential_desc:0 "The potential of our lands are the greatest in the world! We just need the correct group of people to utilize them and reach said potential."
 estate_industrialists_elevate_social_status:0 "Elevate Social Status"
 estate_industrialists_elevate_social_status_desc:0 "Taking inspiration from the persian creation of social classes able to rival long established estates across history, doing the same with $ESTATE_NAME$ will enrage our court, but establishing closer ties with fresh individuals eager to gain favors with the state will certainly help us due to being able to delegade more responsibility with little pushback."
 estate_industrialists_elevate_social_status_tt:0 "Gives §YALL [Root.GetIndustrialistsName]§! privileges additional:\n- §GYearly Corruption Reduction§!\n- §RAdditional State Maintanance Increase§!\n- §TRemoves the absolutism cost of ALL Industrialist Privileges!§!"
 estate_industrialists_allow_selfregulation:0 "Allow Self Regulation"
 estate_industrialists_allow_selfregulation_desc:0 "By loosening the shackles of what the $ESTATE_NAME$ can do with their own land and allowing them to keep a greater amount of wealth, they can compete among each other freely, providing an, in theory, equal playing field."
 estate_industrialists_allow_selfregulation_tt:0 "§TRe-applying [Root.GetIndustrialistsName] monopolies will grant us additional small bonuses!§!"
 estate_industrialists_technocrat_board_of_advice:0 "$ESTATE_NAME$ Board of Advice"
 estate_industrialists_technocrat_board_of_advice_desc:0 "Establish a Board of [Root.GetIndustrialistsName] so that they can help our wise [Root.Monarch.GetTitle] with day to day decisions regarding multiple resource allocation endeavors."
 estate_industrialists_reinforce_contracts:0 "Reinforce Ownership Contracts"
 estate_industrialists_reinforce_contracts_desc:0 "You not only own the land, but you also own everything on said land and the [Root.Monarch.GetTitle] cannot ever forcefully seize anything on said land. That is the promise we grant to the [Root.GetIndustrialistsName]."
 estate_industrialists_introduce_rebates:0 "Introduce Rebates"
 estate_industrialists_introduce_rebates_desc:0 "[Root.GetIndustrialistsName] have come to us with a novel economic theory; If we use state funds to refund some money on big purchases, we can make the economic space within our lands more attractive to foreigners."
 estate_industrialists_introduce_rebates_tt:0 "Tax Income needs to be at least §Y70§!¤ for this privilege to appear, and you need at least §Y10§!¤ of Tax Income for the privilege to not revoke itself!"
 estate_industrialists_demand_workers_on_the_frontlines:0 "Workers as a Backbone"
 estate_industrialists_demand_workers_on_the_frontlines_desc:0 "In times of need, we can demand the industrialists send out their workers to suplement our numbers. They obviously aren't very happy with this arrangement, but they would rather prefer us as a reliable state to work under rather than someone else."
 estate_industrialists_technocrat_education:0 "Technocrat Education"
 estate_industrialists_technocrat_education_desc:0 "Letting the $ESTATE_NAME$ establish their own education centers independant of the government for the purpose of seeking talent, especially for technological advancement, may trickle benefits back to us eventually."
 estate_industrialists_technocrat_education_loyal:0 "Technocrat Education"
 estate_industrialists_technocrat_education_neutral:0 "Technocrat Education"
 estate_industrialists_technocrat_education_disloyal:0 "Technocrats Spreading Dissent"
 estate_industrialists_fund_natural_sciences:0 "Fund Natural Sciences"
 estate_industrialists_fund_natural_sciences_desc:0 "Funding and subsequently recruiting a member of the $ESTATE_NAME$ class focused on research of natural sciences will further help us with enacting innovative techniques."
 estate_industrialists_technology_sharing:0 "Technology Sharing"
 estate_industrialists_technology_sharing_desc:0 "Close mindedness leads to stagnation, and we must prevent that. Let us open up new cooperation opportunites to our alliances and allow the $ESTATE_NAME$ of our nations to work together for even greater technological progress."
 estate_industrialists_technology_sharing_tt:0 "Each ally who also has this privilege will grant us the following, scaling up to 5 allies:\n §G-1.5%§! Technology Cost\n §G-1.5%§! Idea Cost\n §R+10%§! Cost to Promote Mercantelism"
 estate_industrialists_monopoly_on_strategic_resources:0 "Monopoly on Strategic Resources"
 estate_industrialists_monopoly_on_strategic_resources_desc:0 "By allowing our $ESTATE_NAME$ complete control over strategic resources within our lands, letting it go uninterrupted and without further oversight, we set the entire country up for future success."
 estate_industrialists_monopoly_on_strategic_resources_effect_tooltip:3 "§RNo production income from §YStrategic Resources§!§!"
 estate_industrialists_monopoly_on_strategic_resources_revoke_tooltip:1 "Production income from §YStrategic Resources§! is restored"
 MONOPOLY_INCOME_STRATEGIC_RESOURCES_DESC:0 "from production of Strategic Resources"
 estate_industrialists_monopoly_on_war_advanced_goods:0 "Monopoly on Advanced War Goods"
 estate_industrialists_monopoly_on_war_advanced_goods_desc:0 "By allowing our $ESTATE_NAME$ complete control over the flow of advanced war goods, we promote good manners when it comes to re-supplying our troops and a healthy competition between the $ESTATE_NAME$ as to who can make the highest quality equipment."
 estate_industrialists_monopoly_on_war_advanced_goods_effect_tooltip:3 "§RNo production income from §YAdvanced War Goods§!§!"
 estate_industrialists_monopoly_on_war_advanced_goods_revoke_tooltip:1 "Production income from §YAdvanced War Goods§! is restored"
 MONOPOLY_INCOME_WAR_ADVANCED_GOODS_DESC:0 "from production of Advanced War Goods"
 estate_industrialists_exploitation_of_the_new_world:0 "Exploitation of the New World"
 estate_industrialists_exploitation_of_the_new_world_desc:0 "$ESTATE_NAME$ firmly believe that resources from the new world must be gathered up within our nation for the aim of technological progress, and all we need to do is lift our restrictions on interactions and demands the $ESTATE_NAME$ can give out to our colonial subjects."
