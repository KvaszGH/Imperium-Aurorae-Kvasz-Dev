l_english:

 #Mechanics Tooltips
 TFL_ideas: "Tafilalt ideas"
 TFL_ideas_start: "Tafilalt Traditions"
 TFL_ideas_bonus: "Tafilalt Ambition"
 TFL_the_silver_standard: "Silver Standard"
 TFL_the_silver_standard_desc: "As we have reclaimed the silver mine of Imider, we have decided to use it to back our currency. This has created a circumstance where the silver mine of our realm has created prosperity for many of our citizens, as they use the strong currency to not only further develop, but enrich our nation."
 TFL_ending_the_shirk: "Ending the Shirk"
 TFL_ending_the_shirk_desc: "For far too long the Almohad tyrants claimed themselves invincible, not through holy faith nor Allah, but through Satan, whom they claimed to follow. The final straw that proved this to us was the success of the Gothic Reconquista, who show to all of us now the truth: The Almohads have failed."
 TFL_return_of_old_ways: "Return of the Old Ways"
 TFL_return_of_old_ways_desc: "When the caliphate first came to the Maghreb, they brought Arab and Islamic culture with them, converting our peoples away from the pagan Evils and bringing to us the Islamic golden age, where we would help the caliphate by supplying them with our silver. In exchange, we would learn Arabic and gain access to many of the Islamic world's wonders.\nBut then, the Almohad governors came, and what was once our gift, became their 'property'. No privileges came with this, and our people grew poorer by the day as they corrupted our ways of life with the wealth they stole from us.\nBut now? After our long wait, Allah has awarded us with an opportunity! We will reclaim what was rightfully ours, and now, the sultan will soon face our justice."
 TLF_legion_of_the_desert: "Legion of the Desert"
 TLF_legion_of_the_desert_desc: "They emerged from the sands and trampled all who opposed them, then they melted back into the sands from whence they came."
 TFL_just_as_mohammed: "Just as Mohammed"
 TFL_just_as_mohammed_desc: "Just as the Prophet emerged from a desert to conquer the infidel, so we shall show the decadent world the Prophet's might once more!"
 TFL_crush_the_goths: "Crush the Evils"
 TFL_crush_the_goths_desc: "We live in an era far different than our predecessors, for truly, great evils have come to the material world. Faux angels who claim they are the representatives of God, an immortal who slashes and burns at the heart of the Islamic world through the darkness of alchemy and black magic. Do they not see? The Shaytins lead them away from belief for their own paradise!\nBut as Islam teaches, the polytheists will claim the evil that they inflict and will use it to mock all those around them. The suffering they bring upon the world, will only further dig them towards their destruction, from which we will arise again."
 TFL_martyrs_for_mawtini: "Sufist March"
 TFL_martyrs_for_mawtini_desc: "For the longest time, Muslims have used many Islamic texts to live a life as close as possible to God, and endeavor through life’s many trials to achieve a form of Islamic spiritual enlightenment, Ihsan. \nWith our victory in the Mehreb, we must come to embrace this idea to further ourselves and our righteous cause. Thus we call to ashes of Al-Andalus, for we must rise like the White Phoenix, and reclaim our Ihsan."
 vassalize_army_of_light_decision_title: "Protect the Army of Light"
 vassalize_army_of_light_decision_desc: "The Army of Light is unable to stand alone in Africa. We will bring them into our protection."
 
 #Diplo Tooltips
 ia_gain_insights_with_espionage_title: "Steal Secrets"
 ia_gain_insights_with_espionage_desc: "We will gain §G10 Secret Insights§! at the cost of §Y50 Spy Network§!"
 ia_gain_insights_with_espionage_tooltip: "Gain §G10 Secret Insights§! for §Y50 Spy Network§!"
 ia_befuddle_minds_title: "Befuddle Minds"
 ia_befuddle_minds_desc: "We will sabotage their social and technological development! (§R+10% Technology Cost§! and §R+15% Idea Cost§! for the next §Y5 years§!!)"
 ia_befuddle_minds_tooltip: "Hamper their social and technological progress."
 ia_sabotage_logistics_title: "Sabotage Logistics"
 ia_sabotage_logistics_desc: "Our target enemy will receive a §Y6-month penalty§! to §GReinforce Speed§! and §GAttrition taken§!!"
 ia_sabotage_logistics_tooltip: "Ruin their logistics to cause desertion and lack of resupply."
 
 #Government
 palace_of_mirage_reform: "§OPalace of Mirage§!"
 palace_of_mirage_reform_desc: "Rather than a single physical palace, the §OPalace of Mirages§! is the collective name for the many fortifications and laboratories in which we collect secret information and conduct experiments. In the name of the Dragon Princess!"
 silver_dragon_sect_name: "Silver Dragon Sect"
 silver_dragon_sect_name_ADJ: "Draconic"
 ability_draconic_inquisition_mechanic: "The Draconic Inquisition"
 ia_secret_insights: "Secret Insights"
 ia_secret_insights_desc: "Secret Insights are the knowledge we have gathered both from our research and our agents in foreign nations. We can gain Secret Insights by being §Gahead of time in technology§!, having high §YInnovativeness§!, and §Rconducting espionage actions§! in foreign nations."
 monthly_ia_secret_insights: "Monthly Secret Insights"
 ia_secret_insights_gain_modifier: "Secret Insights Gain Modifier"
 ia_shifting_sands: "Shifting Sands"
 ia_shifting_sands_desc: "The very desert itself shifts its geography to suit our needs and confound the enemy!"
 ia_prelude_to_doom: "Prelude to Doom"
 ia_prelude_to_doom_desc: "By showing the enemy terrifying visions both in wakefulness and in their dreams, their willpower will be broken before we even need to fight them."
 ia_experimental_weaponry: "Experimental Weaponry"
 ia_experimental_weaponry_desc: "Who knows what will happen?"
