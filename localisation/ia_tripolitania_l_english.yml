 #Missions
 z62_exciting_new_discovery_tt: "§OExperimental Weaponry§! will generally result in §Gmore positive outcomes§!. Additionally, we will make a §Vtruly revolutionary discovery§!..."
 z62_num_experiment_tt: "Has used §OExperimental Weaponry§! 10 times. Current value: [Root.ExperimentalWeaponry.GetValue] / 10"
 z62_experimental_weaponry_mission_title: "§OInnovative Experiments§!"
 z62_experimental_weaponry_mission_desc: "Our cutting-edge research has resulted in numerous inventions the rest of the world can only gape at. Sometimes, this results in explosions. Other time, they revolutionize our interaction with the world."
 z62_num_sabotage_tt: "Has used §OSabotage Logistics§! 10 times. Current value: [Root.SabotageLogistics.GetValue] / 10"
 z62_sabotage_logistics_mission_title: "§OSabotaged Logistics§!"
 z62_sabotage_logistics_mission_desc: "The experience we have gained from sabotaging enemy logistics has taught us valuable lessons in how best to protect our own. We will ensure there are no weak links in our supply trains and ensure nobody can prevent our soldiers from always being properly supplied and fed."
 z62_num_prelude_tt: "Has used §OPrelude of Doom§! 5 times. Current value: [Root.PreludeDoom.GetValue] / 5"
 improved_prelude_of_doom_tt: "§OPrelude of Doom§! will gain an additional §G+0.5 Military Tactics§!!"
 z62_prelude_of_doom_mission_title: "§OPrelude of Doom§!"
 z62_prelude_of_doom_mission_desc: "When the enemy is utterly terrified of us, they may be defeated before a battle even begins. This is the best way to ensure the safety of our soldiers and our ultimate victory against the Darkness."
 z62_num_befuddle_tt: "Has used §OBefuddle Minds§! 10 times. Current value: [Root.BefuddleMinds.GetValue] / 10"
 z62_befuddle_minds_mission_title: "§OBefuddle Minds§!"
 z62_befuddle_minds_mission_desc: "In our befuddlement of others' minds, we have learned how best to keep our own minds clear as crystal. Nobody shall be able to interfere with the thought processes of our cultivators!"
 z62_num_shifting_sands_tt: "Has activated §OShifting Sands§! 5 times. Current value: [Root.ShiftingSands.GetValue] / 5"
 z62_shifting_sands_mission_title: "§OShifting Sands§!"
 z62_shifting_sands_mission_desc: "The very sands of the desert shift themselves to our advantage. No intruder shall leave unscathed!"
 z62_improved_shifting_sands_tt: "The §YShifting Sands§! action will §Gprovide an additional bonus§! to §YForts in Deserts§!."
 can_upgrade_palace_of_mirage_flag: "Can upgrade the Palace of Mirage"
 z62_can_use_holy_city_flag: "Kairouan unlocked by Mission Reward"
 z62_can_use_holy_city_tt: "We will be able to use the §YHoly City of Kairouan§! monument!"
 z62_palace_of_mirages_mission_title: "§OPalace of Mirages§!"
 z62_palace_of_mirages_mission_desc: "Rather than a single physical palace, the Palace of Mirages is the collective name for the many fortifications and laboratories in which we collect secret information and conduct experiments. In the name of the Dragon Princess!"
 z62_infiltrate_enemies_title: "Infiltrate Enemies"
 z62_infiltrate_enemies_desc: "In order to ensure victory in a thousand conflicts, we must know the enemy just as we know ourselves. This calls for mastery of espionage; no information shall be beyond our eyes and ears!"
 z62_4_other_provinces_get_universities_tt: "Four other provinces §Gmeeting the mission requirements§! will also receive a §YUniversity§!."
 z62_establish_schools_title: "Establish Academies"
 z62_establish_schools_desc: "The Dragon has commanded that we shall educate the people. And thus we shall!"
 z62_welcome_the_dragon_title: "Welcome the Dragon"
 z62_welcome_the_dragon_desc: "Tripoli must become a fine city worthy of the Dragon Princess gracing us with Her presence."
 z62_greek_fire_title: "Replicate Greek Fire"
 z62_greek_fire_desc: "Though we know not their secret formula, we can create something quite similar with highly flammable oil, for it cannot be put out with water. Now we need only study the devices the Greeks used to transport and harness their liquid fire."
 z62_firebombs_for_cultivators_title: "Explosives for Cultivators"
 z62_firebombs_for_cultivators_desc: "Throwable mini-explosives have proven to be popular among our martial Cultivators. Even if they are blocked or caught, they wreck havoc amongst the opponent's formations, and the accuracy with which a skilled martial artist can throw them makes them a nightmare for enemy commanders."
 z62_incendiary_artillery_title: "Incendiary Artillery"
 z62_incendiary_artillery_desc: "We shall rain down fire upon the enemy from afar, and they will be powerless to respond as their buildings burn to ash and their supplies incinerate in water-proof flames."
 z62_fire_weaponry_title: "Fire-based Weaponry"
 z62_fire_weaponry_desc: "So many ways to set our enemies on fire, to make them explode, to end their puny resistance in the face of overwhelming firepower... Even our martial cultivators have begun to add these new weapons to their thus-far traditionalist armories!"
 z62_sulfur_byproduct_title: "Sulfur Byproduct"
 z62_sulfur_byproduct_desc: "A major byproduct of the refinery process is Sulfur. While it may technically be a byproduct, sulfur is greatly useful and rare in and of itself, and our weapons researchers are already besides themselves in glee at the opportunities this brings."
 z62_industrial_oil_title: "Industrial Oil Usage"
 z62_industrial_oil_desc: "Now that we have a process to refine the oil, we shall put it to good use in our alchemical industries. As a type of fuel, it is far more effective than charcoal, which is rare in this region anyhow."
 z62_investigate_black_liquid_title: "Investigate Black Liquid"
 z62_investigate_black_liquid_desc: "Nomads and merchants through the desert have reported finding some sort of flammable black liquid. If this matches with certain records in our archives, this is a very promising discovery indeed."
 z62_refinery_methodology_title: "Refining Methodology"
 z62_refinery_methodology_desc: "Before the raw oil can be used, we must develop a process to refine it. Though our archives describe some of the basic elements of this refinery process, empirical testing is necessary to iron out the details and maximize efficiency."
 z62_ivory_trade_title: "Regulate Ivory Trade"
 z62_ivory_trade_desc: "Ivory harvested from elephants is in quite high demand; however, due to aggressive overhunting, wasteful harvesting methods, and the slow reproduction of elephants, the ivory trade is at risk of collapse. We must establish preserves under strict regulation to prevent poaching and ensure that ivory is harvested sustainably and the elephant populations can recover. This will also lead to the supply of ivory being reduced and thus the price increasing, providing even more income for the state coffers."
 z62_ivory_tt: "Regulated Ivory Trade"
 z62_transsaharan_trade_title: "Trans-Saharan Trade"
 z62_transsaharan_trade_desc: "Our dominance of the Trans-Saharan trade has firmly established us as an economic powerhouse in Africa and the Mediterranean. Goods from Central Africa arrive throughout Europe and the Levant at our discretion, and thus we are free to charge a premium."
 z62_palm_oil_tt: "Popularization of Palm Oil"
 z62_palm_oil_title: "Uses of Palm Oil"
 z62_palm_oil_desc: "Palm Oil has proven to be an incredibly versatile oil. From use as a cooking oil and a basis for soap production to being an alchemical ingredient and industrial lubricant, almost every facet of our economy has begun demanding palm oil since we discovered it."
 z62_carmine_dye_industry_title: "Crimson Dye Industry"
 z62_carmine_dye_industry_desc: "The bark and heartwood of the local Camwood tree (Baphia Nitida) can be used to create a non-soluble red dye. As red dyes tend to be rare and valuable, even as the color red is greatly auspicious and in high demand for special events, this is a great opportunity to create a new dye industry."
 z62_carmine_tt: "Crimson Dye Monopoly"
 z62_millet_tt: "Millet for the People"
 z62_millet_for_the_people_title: "Cultivate Millet"
 z62_millet_for_the_people_desc: "Rice and Grain grow poorly in the arid environments of Africa. However, millet appears to be a native crop to the area and will serve just as well as a staple crop to feed our people."
 z62_gold_mines_title: "Gold of Mali"
 z62_gold_mines_desc: "The infamous Mansa Musa once collapsed the economy along the way as he travelled to Mecca. Now, we shall gain control of his erstwhile gold mines and put them to much wiser use than randomly splurging in Egypt."
 STRONG_CAMELS_TT: "Camel Caravans"
 z62_camel_breeding_title: "Camel Husbandry"
 z62_camel_breeding_desc: "Camels are a vital draft animal for crossing the desert. Their resilience to the heat and lack of water makes them the perfect pack animal and even mount in this region, where the famed Auroral warhorses tend to do poorly."
 z62_supply_salt_title: "Control Salt Trade"
 z62_supply_salt_desc: "Salt is a vital resource for use in food preservation and consumption. With the Sahara being a major site of salt production, we should take the opportunity to establish our dominance over the salt trade."
 unlocks_decision_vassalize_AOL_tt: "Unlocks a §Ydecision§! to §Gvassalize the§! @[AOL.GetTag][AOL.GetName]"
 army_of_light_spawned_flag: "Army of Light has spawned"
 z62_cross_the_sahara_title: "Cross the Sahara"
 z62_cross_the_sahara_desc: "Across the inhospitable Sahara desert lies another land to be brought into the Light. While a number of brave pioneers calling themselves the Army of Light have taken the initiative to spread enlightenment here, their forces on their own will surely prove too weak to deal with this great challenge. We shall offer them our support and ensure that the blight of darkness finds no home on either side of the Sahara."
 z62_beyond_atlas_title: "Beyond the Atlas"
 z62_beyond_atlas_desc: "We have reached beyond the Atlas and arrived at the very western coast of this continent. Now, holding one half of the strait of Gibraltar, we can truly call ourselves the Great Western Gate of the Empire, one through which no enemy shall be allowed to enter."
 z62_barbary_coast_title: "Seize Barbary Coast"
 z62_barbary_coast_desc: "Between pirates, Moroccans, Communists, and Crusader scum, the Barbary Coast is truly a land of unrest. Only through our rightful conquest shall this land know peace."
 z62_imperial_south_italy_title: "Imperial South Italy"
 z62_imperial_south_italy_desc: "With southern Italy safely in the Empire's warm embrace, the distant city of Rome is finally connected to the imperial capital in Antioch. We have also acquired access to the shipbuilding technology and infrastructure of southern Italy in the process."
 z62_conquer_sicily_title: "Conquer Sicily"
 z62_conquer_sicily_desc: "If Malta is a thorn in Mediterranean trade, then Sicily is an entire rosebush. With control of Sicily, we can interdict any trade we wish between the western and eastern Mediterranean while offering favorable conditions to merchants in our good graces."
 fortress_malta_tt: "If @[KNI.GetTag][KNI.GetName] are our subject, we will turn them into a §YHoly Order§! with a §Gspecial naval bonus§!."
 z62_fortress_malta_title: "Fortress of Malta"
 z62_fortress_malta_desc: "Malta is an incredibly strategic island controlling traffic between Sicily and North Africa. While it is already part of the Empire, the current management is much to independent for our purposes, so it would be to everyone's advantage if we were to establish our proper control over the island and its vital fortress."
 z62_oasis_development_title: "Develop the Oases"
 z62_oasis_development_desc: "For the tribes and merchants frequenting the Saharan routes, oases are indispensable locations to recuperate and resupply. The Auroral Sanctuary Nalut was established around one such oasis and has proven to be a model for oasis cities. We should learn their ways and work on replicating their success throughout the desert, that such a harsh and inhospitable land may become our little earthly paradise."
 z62_pacify_vandalia_title: "Vandalize Vandalia"
 z62_pacify_vandalia_desc: "The Vandals have vandalized our coastlines for too long. It is time to put an end to their ways of vandalism once and for all."
 z62_protect_the_desert_title: "Safeguard Serene Sands"
 z62_protect_the_desert_desc: "Some Outremer scum still infest the internal deserts. We shall revoke their permission to exist and expunge this stain upon the serene sands."
 z62_license_to_expand_title: "Imperial Endorsement"
 z62_license_to_expand_desc: "As the Western Gate of the Empire and the predominant Cultivator Order, it is only natural that the Prince of the Aurora grants us approval to expand our lands so we can better serve the Empire."
 
 
 # events
 ia_prospering_time_decline_tt: "This is not a good time."
 ia_flavor_z62.1.t: "Future of the Salt Trade"
 ia_flavor_z62.1.d: "Establishing an Imperial Monopoly of the salt trade could prove greatly profitable and help fund the budget long-term. On the other hand, we have sufficient salt production that we could also flood the global market, making salt no longer such a rare commodity and disrupting foreign state salt monopolies, such as that of the German Crown. This would also come with great profits in the short-term, before salt prices drop and the black market trade loses its value."
 ia_flavor_z62.1.a: "Institute our own Salt Monoply."
 ia_flavor_z62.1.b: "Salt for all!"
 imperial_monopoly_tt: "Imperial Salt Monopoly"
 saharan_salt_overflow_tt: "Saharan Salt"
 10_years_of_salt_tt: "Gain §G10 years of production income§! from §YSalt§!-producing provinces!"
 ia_flavor_z62.2.t: "Audience with the Dragon Princess"
 ia_flavor_z62.2.d: "The arrival of the Dragon Princess has thrown the entire scene of cultivation into disarray. To be in the presence of a real, living dragon! A deity in the flesh! As the primary organization of cultivators in the Empire, it is our responsibility to put together a delegation to request an audience with Her, and thus we have done so. And the relevations this delegation have brought back have revolutionized our practices, shown us worlds we were not even able to imagine... along with an offer. For us to become the extension of Her will and Her weapon against the foes of the Empire both internal and external."
 ia_flavor_z62.2.a: "We must accept this offer."
 ia_flavor_z62.4.t: "Experimental Outcome"
 ia_flavor_z62.4.d: "The outcome of our recent experimentation into new weaponry has been wildly successful, and we have come up with some surprise tricks for our next conflict. The factor of surprise will wear off eventually, but for now..."
 ia_flavor_z62.4.a: "Let the enemy fear us!"
 ia_flavor_z62.5.t: "Experimental Outcome"
 ia_flavor_z62.5.d: "The outcome of our recent experimentation into new weaponry has been wildly successful, though not in the way we intended. Though its use as a weapon is questionable, our alchemists have put the invention to great use in construction and clearing ground."
 ia_flavor_z62.5.a: "Great!"
 ia_flavor_z62.6.t: "Experimental Outcome"
 ia_flavor_z62.6.d: "Well, nothing happened and the invention was a great failure."
 ia_flavor_z62.6.a: "At least it didn't explode..."
 ia_flavor_z62.7.t: "Experimental Outcome"
 ia_flavor_z62.7.d: "While the outcome of our recently invented elixir initially seemed quite promising and it was widely embraced by the bureaucracy, it has turned out to have greatly negative side effects. Many of our administrators are now on sick leave and even the economy has suffered due to misuse of this elixir."
 ia_flavor_z62.7.a: "What a disaster!"
 ia_flavor_z62.8.t: "Experimental Outcome"
 ia_flavor_z62.8.d: "While our recently invented weapon seems promising initially, in practical use it has resulted in misfires and caused more injuries among its users than casualties among the enemy. Now we must root out this weapon from all our stockpiles before more explosions occur."
 ia_flavor_z62.8.a: "What a disaster!"
 ia_flavor_z62.9.t: "Minds Befuddled!"
 ia_flavor_z62.9.d: "For some mysterious reason, our best scientists and philosophers have found their minds sluggish and unproductive recently. With our best and brightest out of commission, how will we move forward?"
 ia_flavor_z62.9.a: "What a disaster!"
 ia_flavor_z62.10.t: "Logistics Ruined!"
 ia_flavor_z62.10.d: "Unknown saboteurs have burnt our grain silos, strucks holes in our boxes, and broken the wheels of our wagons! Without necessary food and supplies, our soldiers on the frontlines cannot fight, and desertion has risen to incredible heights!"
 ia_flavor_z62.10.a: "What a disaster!"
 ia_flavor_z62.11.t: "A Brilliant Invention"
 ia_flavor_z62.11.d: "Today, the greatest minds of the Palace of Mirage have come to present their newest discovery: the Flying Ship. According to the demonstration, they are able to float in the air and defy gravity using some specialized alchemical crystals combined with oil and water as fuel. While air-bound models of these ships are cumbersone and will for now only serve as novelty attractions, installing the floatation engines into naval vessels allows them to practically fly through the seas at high speed even while carrying heavy loads. Both the merchants and the navy will love this!"
 ia_flavor_z62.11.a: "Call the shipwrights!"